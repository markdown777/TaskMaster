<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TaskMaster</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TaskMaster</h1>
      <div class="header-actions">
        <button id="ai-toggle-btn" class="icon-btn" title="✨ AI 智能分析">✨</button>
        <button id="search-toggle-btn" class="icon-btn" title="搜索任务">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <!-- 原有的设置按钮在底部，这里仅按照计划添加 -->
      </div>
    </div>
    <div class="task-form-container">
      <form id="taskForm">
        <input type="text" id="new-task" placeholder="添加新任务..." autocomplete="off">
        <div class="task-options">
          <div class="task-option-row">
            <select id="task-priority" class="priority-select">
              <option value="medium">中优先级</option>
              <option value="high">高优先级</option>
              <option value="low">低优先级</option>
            </select>
            <input type="text" id="task-tags" class="tags-input" placeholder="标签（用逗号分隔）">
            <button type="button" id="due-button" class="due-button" title="设置截止时间">时间</button>
            <button type="submit">创建</button>
          </div>
          <div id="due-popover" class="due-popover" hidden>
            <div class="due-popover-inner">
              <div class="due-popover-row">
                <input type="datetime-local" id="task-due" class="due-date-input">
                <button type="button" id="due-popover-close" class="due-popover-close" title="关闭">关闭</button>
              </div>
              <div class="due-quick-row">
                <button type="button" class="due-quick" data-preset="plus60">1小时后</button>
                <button type="button" class="due-quick" data-preset="today18">今天18:00</button>
                <button type="button" class="due-quick" data-preset="tomorrow09">明天09:00</button>
                <button type="button" class="due-quick" data-preset="clear">清除</button>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
    
    <!-- 搜索功能弹出层 -->
    <div id="search-popover" class="search-popover" hidden>
      <div class="search-popover-inner">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="搜索任务..." autocomplete="off">
          <button id="search-clear" class="search-clear-btn" title="清空">×</button>
        </div>
        <div class="search-filters">
          <label class="filter-checkbox">
            <input type="checkbox" id="search-active" checked>
            <span>活动</span>
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" id="search-completed" checked>
            <span>已完成</span>
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" id="search-notes">
            <span>有备注</span>
          </label>
        </div>
      </div>
    </div>
    <ul id="task-list" class="task-list"></ul>
    <div class="action-footer">
      <button id="share-btn" title="分享任务">分享</button>
      <button id="settings-btn" title="打开设置">设置</button>
    </div>
  </div>
  <script src="constants.js"></script>
  <script src="utils.js"></script>
  <script src="adapters/storage.js"></script>
  <script src="adapters/crypto.js"></script>
  <script src="adapters/network.js"></script>
  <script src="services/ai.js"></script>
  <script src="taskManager.js"></script>
  <script src="shareManager.js"></script>
  <script src="popup.js"></script>

  <!-- PIN Prompt Modal -->
  <div id="pin-modal" class="modal" hidden>
    <div class="modal-content">
      <h3>解锁 AI 助理</h3>
      <p>请输入您在设置中配置的 4 位安全 PIN 码以解密 API Key。</p>
      <input type="password" id="pin-input" class="form-control" maxlength="4" placeholder="****">
      <div class="modal-actions">
        <button id="pin-cancel-btn" class="secondary-btn">取消</button>
        <button id="pin-submit-btn" class="primary-btn">解锁</button>
      </div>
      <p id="pin-error" class="error-text" hidden>PIN码错误或解密失败</p>
    </div>
  </div>
</body>
</html>
