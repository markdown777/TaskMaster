<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TaskMaster 设置</title>
  <style>
    :root {
      --bg-primary: #FFFFFF;
      --bg-secondary: #F6F6F6;
      --text-primary: #111111;
      --text-secondary: #888888;
      --border-light: rgba(0, 0, 0, 0.08);
      --brand-color: #111111;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    .settings-container {
      max-width: 640px;
      margin: 80px auto;
      padding: 0 40px;
    }

    .settings-header {
      margin-bottom: 64px;
    }

    .settings-header h2 {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin: 0 0 8px 0;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 16px;
      margin: 0;
    }

    .section-block {
      margin-bottom: 48px;
    }

    .section-block h3 {
      font-size: 14px;
      letter-spacing: 0.2px;
      color: var(--text-secondary);
      margin: 0 0 24px 0;
      font-weight: 800;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Checkbox 重构 */
    .modern-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      cursor: pointer;
    }

    .modern-checkbox input[type="checkbox"] {
      accent-color: var(--brand-color);
      width: 18px;
      height: 18px;
      margin-top: 4px;
      cursor: pointer;
    }

    .label-text {
      display: flex;
      flex-direction: column;
    }

    .label-text .title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .label-text .desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* 输入框重构 */
    .modern-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
      margin-left: 34px;
    }

    .modern-input-group input[type="password"],
    .modern-input-group select {
      width: 100%;
      max-width: 320px;
      padding: 12px 0;
      border: none;
      border-bottom: 2px solid var(--border-light);
      background: transparent;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      transition: border-color 0.3s var(--ease-out-expo);
      border-radius: 0;
    }

    .modern-input-group input:focus,
    .modern-input-group select:focus {
      outline: none;
      border-bottom-color: var(--brand-color);
    }

    .warning-text {
      color: #ff4444;
      font-size: 12px;
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .separator {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 48px 0;
    }

    /* 按钮重构 */
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .action-btn {
      padding: 12px 24px;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: all 0.2s var(--ease-out-expo);
    }

    .action-btn:hover {
      border-color: var(--text-primary);
      transform: scale(0.98);
    }

    .action-btn.danger {
      color: #ff4444;
      border-color: rgba(255, 68, 68, 0.2);
    }
    
    .action-btn.danger:hover {
      border-color: #ff4444;
    }

    .save-btn {
      background: var(--brand-color);
      color: var(--bg-primary);
      border: none;
      padding: 16px 32px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: transform 0.2s var(--ease-out-expo);
    }

    .save-btn:hover {
      transform: scale(0.98);
    }

    .reset-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 16px 32px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .reset-btn:hover {
      color: var(--text-primary);
    }

    /* 数据统计面板 */
    #dataStats {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-top: 24px;
      padding: 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
    }

    /* 状态提示重构 */
    .status-message {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--brand-color);
      color: var(--bg-primary);
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
      display: none;
    }
    
    .status-message.error {
      background: #ff4444;
    }

  </style>
</head>
<body>
  <div class="settings-container">
    <header class="settings-header">
      <h2>设置</h2>
      <p class="subtitle">管理 TaskMaster 的显示、安全和数据选项。</p>
    </header>

    <section class="section-block">
      <h3>安全</h3>
      <div class="control-group">
        <label class="modern-checkbox">
          <input type="checkbox" id="enableEncryption">
          <div class="label-text">
            <span class="title">启用加密</span>
            <span class="desc">加密存储任务数据，提高本地数据安全性</span>
          </div>
        </label>
        
        <div id="encryptionOptions" class="modern-input-group" style="display: none;">
          <input type="password" id="encryptionKey" placeholder="请输入至少8位密钥">
          <span class="warning-text">请妥善保管密钥，忘记密钥将无法恢复数据。</span>
        </div>
      </div>
    </section>

    <hr class="separator" />

    <!-- AI 助理配置 -->
    <section class="section-block">
      <h3>✨ AI 助理配置</h3>
      <p class="subtitle" style="margin-bottom: 24px;">配置大语言模型接口，启用智能自然语言解析与截图任务提取功能。</p>
      
      <div class="control-group">
        <label class="modern-checkbox">
          <input type="checkbox" id="aiEnableEncryption">
          <div class="label-text">
            <span class="title">启用 API 安全加密</span>
            <span class="desc">勾选后将使用 PIN 码对 API Key 进行 AES-256 加密。不勾选则明文存储，使用 AI 功能时无需解锁。</span>
          </div>
        </label>

        <div class="modern-input-group" style="margin-left: 0;">
          <label class="title" style="font-weight:600; margin-bottom: 4px;" for="aiProvider">模型提供商</label>
          <select id="aiProvider">
            <option value="deepseek">DeepSeek (默认，推荐)</option>
            <option value="openai">OpenAI (兼容格式)</option>
          </select>
        </div>

        <div class="modern-input-group" id="customUrlGroup" style="display: none; margin-left: 0;">
          <label class="title" style="font-weight:600; margin-bottom: 4px;" for="aiBaseUrl">自定义接口地址 (Base URL)</label>
          <input type="url" id="aiBaseUrl" placeholder="例如: https://api.deepseek.com/v1">
        </div>

        <div class="modern-input-group" style="margin-left: 0;">
          <label class="title" style="font-weight:600; margin-bottom: 4px;" for="aiApiKey">API Key</label>
          <input type="password" id="aiApiKey" placeholder="输入您的 API Key">
          <p class="desc" id="deepseekHelp" style="font-size:13px; color:var(--text-secondary); margin-top:4px;">
            没有 Key？<a href="https://platform.deepseek.com/" target="_blank">点击前往 DeepSeek 开放平台免费申请</a>。
          </p>
        </div>

        <div class="modern-input-group" id="aiPinCodeGroup" style="margin-left: 0; display: none;">
          <label class="title" style="font-weight:600; margin-bottom: 4px;" for="aiPinCode">安全加密 PIN 码</label>
          <input type="password" id="aiPinCode" placeholder="设置一个4位数PIN码用于加密您的 API Key" maxlength="4">
          <p class="desc" style="font-size:13px; color:var(--text-secondary); margin-top:4px;">您的 API Key 将通过此 PIN 码加密并仅存储在本地。每次重启浏览器需要输入此 PIN 解锁。</p>
        </div>
      </div>
    </section>

    <hr class="separator" />

    <section class="section-block">
      <h3>显示</h3>
      <div class="control-group">
        <label class="modern-checkbox">
          <input type="checkbox" id="showCompletedTasks" checked>
          <div class="label-text">
            <span class="title">显示已完成任务</span>
            <span class="desc">在主列表中保留已完成内容</span>
          </div>
        </label>
        <label class="modern-checkbox">
          <input type="checkbox" id="autoExpandToday" checked>
          <div class="label-text">
            <span class="title">自动展开今天</span>
            <span class="desc">启动时自动展开今天的任务</span>
          </div>
        </label>
        <label class="modern-checkbox">
          <input type="checkbox" id="showTaskStats" checked>
          <div class="label-text">
            <span class="title">显示统计信息</span>
            <span class="desc">在搜索结果中显示任务统计</span>
          </div>
        </label>
      </div>
    </section>

    <hr class="separator" />

    <section class="section-block">
      <h3>行为</h3>
      <div class="control-group">
        <label class="modern-checkbox">
          <input type="checkbox" id="confirmDelete" checked>
          <div class="label-text">
            <span class="title">删除前确认</span>
            <span class="desc">删除任务前弹出确认提示</span>
          </div>
        </label>
        <label class="modern-checkbox">
          <input type="checkbox" id="autoSaveNotes" checked>
          <div class="label-text">
            <span class="title">自动保存备注</span>
            <span class="desc">离开备注输入区域时自动保存</span>
          </div>
        </label>
        
        <div class="modern-input-group" style="margin-left: 0;">
          <span class="title" style="font-weight:600; margin-bottom: 4px;">已完成任务保留时间</span>
          <select id="taskRetentionDays">
            <option value="30">30天</option>
            <option value="90" selected>90天</option>
            <option value="180">180天</option>
            <option value="365">1年</option>
            <option value="0">永久保留</option>
          </select>
          <span class="desc" style="font-size:13px; color:var(--text-secondary); margin-top:4px;">设置已完成任务的保留时长</span>
        </div>
      </div>
    </section>

    <hr class="separator" />

    <section class="section-block">
      <h3>通知</h3>
      <div class="control-group">
        <label class="modern-checkbox">
          <input type="checkbox" id="enableNotifications" checked>
          <div class="label-text">
            <span class="title">启用通知提醒</span>
            <span class="desc">到期任务显示桌面通知</span>
          </div>
        </label>
        <label class="modern-checkbox">
          <input type="checkbox" id="soundNotifications">
          <div class="label-text">
            <span class="title">声音提醒</span>
            <span class="desc">通知出现时播放提示音</span>
          </div>
        </label>
      </div>
    </section>

    <hr class="separator" />

    <section class="section-block">
      <h3>数据管理</h3>
      <p class="subtitle" style="margin-bottom: 24px;">更换浏览器或重装插件前，建议先导出备份。</p>
      
      <div class="action-row">
        <button id="exportData" class="action-btn">导出数据</button>
        <button id="importData" class="action-btn">导入数据</button>
        <button id="showBackupsBtn" class="action-btn">查看自动备份</button>
        <button id="clearAllData" class="action-btn danger">清空所有数据</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
      
      <div id="dataStats"></div>
    </section>

    <div style="display: flex; gap: 16px; margin-top: 64px;">
      <button id="saveSettings" class="save-btn">保存设置</button>
      <button id="resetSettings" class="reset-btn">恢复默认</button>
    </div>
  </div>

  <script src="constants.js"></script>
  <script src="adapters/storage.js"></script>
  <script src="adapters/crypto.js"></script>
  <script src="options.js"></script>
</body>
</html>
